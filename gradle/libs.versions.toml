[versions]
androidGradlePlugin = "9.0.0"
androidxCore = "1.17.0"
androidxWatchface = "1.2.1"
coroutines = "1.10.2"
maplibre = "13.0.2"
playServicesLocation = "21.3.0"
work = "2.11.0"
junit = "4.13.2"

[libraries]
androidx-core-ktx = { module = "androidx.core:core-ktx", version.ref = "androidxCore" }
androidx-watchface-complications-data-source-ktx = { module = "androidx.wear.watchface:watchface-complications-data-source-ktx", version.ref = "androidxWatchface" }
kotlinx-coroutines-android = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-android", version.ref = "coroutines" }
kotlinx-coroutines-play-services = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-play-services", version.ref = "coroutines" }
maplibre-android = { module = "org.maplibre.gl:android-sdk", version.ref = "maplibre" }
play-services-location = { module = "com.google.android.gms:play-services-location", version.ref = "playServicesLocation" }
work-runtime-ktx = { module = "androidx.work:work-runtime-ktx", version.ref = "work" }
junit = { module = "junit:junit", version.ref = "junit" }

[plugins]
android-application = { id = "com.android.application", version.ref = "androidGradlePlugin" }
